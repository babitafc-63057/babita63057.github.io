<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chroma Palette Tool</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

    :root {
      --bg: #f7f7f5;
      --panel: #ffffff;
      --line: #efefed;
      --line-2: #e0e0de;
      --text: #1a1a1a;
      --muted: #9b9b95;
      --dark: #1a1a1a;
      --ok: #2a6a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 42%, #f0f0ed 100%);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      min-height: 100vh;
    }

    .topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0 22px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
      gap: 10px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .brand-wrap,
    .season-badge-wrap {
      display: flex;
      align-items: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 0;
    }

    .brand-bars {
      display: flex;
      gap: 3px;
    }

    .brand-bars span {
      width: 6px;
      height: 24px;
      display: block;
    }

    .brand-title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
    }

    .brand-sub {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #bbb;
      margin-top: 1px;
    }

    .tabs {
      display: flex;
      align-items: stretch;
    }

    .tab {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #aaa;
      cursor: pointer;
      padding: 14px 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover {
      color: #555;
    }

    .tab.on {
      color: var(--text);
      border-bottom-color: var(--dark);
    }

    .season-badge {
      margin-left: auto;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.14em;
      color: #bdbdb6;
    }

    .view {
      min-height: calc(100vh - 57px);
      animation: fadeIn 0.22s ease;
    }

    .collections-layout {
      display: grid;
      grid-template-columns: 230px 1fr 220px;
      min-height: calc(100vh - 57px);
    }

    .build-layout {
      display: grid;
      grid-template-columns: 1fr 230px;
      min-height: calc(100vh - 57px);
    }

    .trendboard-layout {
      display: grid;
      grid-template-columns: 265px 1fr 250px;
      min-height: calc(100vh - 57px);
    }

    .panel {
      background: var(--panel);
      overflow: auto;
    }

    .panel.left {
      border-right: 1px solid var(--line);
    }

    .panel.right {
      border-left: 1px solid var(--line);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .canvas {
      padding: 24px 28px;
      overflow: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 8px;
    }

    .sub-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .section-head {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    .row-wrap {
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--line);
    }

    .btn-chip {
      border: 1px solid var(--line-2);
      background: #fff;
      color: #888;
      cursor: pointer;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .btn-chip:hover {
      border-color: #9e9e98;
      color: #444;
    }

    .btn-chip.on {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .collection-row {
      display: flex;
      gap: 12px;
      align-items: center;
      border-left: 3px solid transparent;
      border-bottom: 1px solid var(--line);
      padding: 13px 18px;
      cursor: pointer;
      transition: background 0.14s;
    }

    .collection-row:hover {
      background: #f3f3f1;
    }

    .collection-row.on {
      background: #fff;
      border-left-color: var(--dark);
    }

    .collection-mini-grid {
      width: 48px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 2px;
      flex-shrink: 0;
    }

    .collection-mini-grid span {
      height: 16px;
      display: block;
    }

    .muted {
      color: #bbb;
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .mono {
      font-family: "DM Mono", monospace;
    }

    .color-grid-lg {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
      margin-bottom: 26px;
    }

    .color-grid-5 {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .color-chip {
      border: none;
      background: transparent;
      display: flex;
      flex-direction: column;
      text-align: left;
      width: 100%;
      cursor: pointer;
      transition: transform 0.18s cubic-bezier(.34,1.4,.64,1), box-shadow 0.18s;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    .color-chip:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
    }

    .color-chip.selected {
      transform: translateY(-6px);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }

    .chip-color {
      position: relative;
      overflow: hidden;
      border: 2px solid transparent;
      border-bottom: none;
    }

    .color-chip.selected .chip-color {
      border-color: var(--dark);
    }

    .chip-meta {
      background: #fff;
      border: 2px solid #e8e8e8;
      border-top: none;
      padding: 5px 7px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .color-chip.selected .chip-meta {
      border-color: var(--dark);
    }

    .chip-name {
      font-size: 8px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chip-code {
      font-size: 7px;
      color: #8e8e8e;
      letter-spacing: 0.06em;
      margin-top: 1px;
      font-family: monospace;
    }

    .chip-copy {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
    }

    .chip-sm .chip-color { height: 80px; }
    .chip-sm .chip-meta { height: 32px; }

    .chip-md .chip-color { height: 110px; }
    .chip-md .chip-meta { height: 40px; }

    .chip-lg .chip-color { height: 140px; }
    .chip-lg .chip-meta { height: 48px; }
    .chip-lg .chip-name { font-size: 9px; }

    .chip-mini {
      width: 100%;
      border: none;
      background: transparent;
      text-align: left;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .chip-mini:hover {
      transform: translateY(-2px);
    }

    .chip-mini .chip-color {
      border: 1.5px solid #e8e8e8;
      border-bottom: none;
      height: 48px;
    }

    .chip-mini .chip-meta {
      border: 1.5px solid #e8e8e8;
      border-top: none;
      padding: 3px 4px;
    }

    .chip-mini .chip-name {
      font-size: 7px;
    }

    .chip-mini .chip-code {
      font-size: 6px;
      color: #aaa;
    }

    .line-gradient {
      height: 6px;
      margin-bottom: 16px;
    }

    .trend-chip {
      border: 1px solid var(--line-2);
      background: #fff;
      color: #888;
      cursor: pointer;
      padding: 4px 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.15s;
    }

    .trend-chip:hover {
      border-color: #999;
      color: #444;
    }

    .trend-chip.on {
      background: var(--dark);
      border-color: var(--dark);
      color: #fff;
    }

    .save-btn {
      border: 1.5px solid var(--dark);
      background: var(--dark);
      color: #fff;
      cursor: pointer;
      width: 100%;
      padding: 11px 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: all 0.16s;
    }

    .save-btn:hover {
      background: #323232;
    }

    .save-btn.done {
      background: var(--ok);
      border-color: var(--ok);
    }

    .meta-card {
      border: 1px solid #e8e8e8;
      background: #fff;
      padding: 12px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f0f0f0;
      padding: 6px 0;
      font-size: 11px;
    }

    .empty {
      border: 2px dashed #e0e0e0;
      background: #fff;
      min-height: 160px;
      display: grid;
      place-items: center;
      text-align: center;
      margin-bottom: 20px;
      color: #ccc;
      padding: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f5f5f3;
      border: 1px solid #e8e8e6;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .pill button {
      border: none;
      background: none;
      color: #bbb;
      cursor: pointer;
      font-size: 10px;
      line-height: 1;
    }

    .text-block {
      background: #fff;
      border: 1px solid var(--line);
      padding: 14px 16px;
      position: relative;
    }

    .text-toolbar {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .text-style-btn {
      border: 1px solid var(--line-2);
      background: #fff;
      color: #888;
      cursor: pointer;
      padding: 2px 7px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.06em;
      transition: all 0.12s;
    }

    .text-style-btn.on {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .icon-btn {
      border: 1px solid #ddd;
      background: #fff;
      color: #888;
      cursor: pointer;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 10px;
    }

    .icon-btn.soft {
      border: none;
      border-radius: 0;
      width: auto;
      height: auto;
      background: transparent;
      color: #ccc;
      padding: 0 2px;
      font-size: 12px;
    }

    textarea,
    input[type="text"],
    select {
      border: 1px solid var(--line-2);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    textarea {
      width: 100%;
      resize: none;
      padding: 11px 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    textarea:focus,
    input[type="text"]:focus,
    select:focus {
      border-color: #1a1a1a;
    }

    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      font-size: 11px;
    }

    input[type="color"] {
      -webkit-appearance: none;
      border: 1.5px solid var(--line-2);
      width: 44px;
      height: 44px;
      cursor: pointer;
      padding: 2px;
      background: none;
    }

    input[type="color"]:hover {
      border-color: var(--dark);
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
    }

    .saved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .saved-card {
      border: 1px solid var(--line);
      background: #fff;
    }

    .saved-strip {
      height: 80px;
      display: grid;
    }

    .saved-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
    }

    .split-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      height: 200px;
      margin-bottom: 20px;
    }

    .wide-strip {
      display: flex;
      gap: 2px;
      height: 120px;
      margin-bottom: 4px;
    }

    .wide-item {
      flex: 1;
      position: relative;
      transition: flex 0.2s;
    }

    .wide-item:hover {
      flex: 1.4;
    }

    .swatch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .swatch-grid.free {
      grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
      gap: 8px;
      margin-bottom: 0;
    }

    .relative {
      position: relative;
    }

    .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      z-index: 2;
    }

    .tb-header {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .tb-header input[type="text"] {
      border: none;
      background: transparent;
      font-size: 18px;
      font-weight: 700;
      flex: 1;
      min-width: 170px;
      padding: 0;
    }

    .tb-header input[type="text"]:focus {
      border: none;
    }

    .layout-btn {
      border: 1px solid var(--line-2);
      background: #fff;
      color: #888;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      transition: all 0.15s;
    }

    .layout-btn.on {
      background: var(--dark);
      color: #fff;
      border-color: var(--dark);
    }

    .tb-palette-source {
      padding: 8px 16px;
      border-top: 1px solid #f5f5f5;
      background: #fafafa;
    }

    .tb-collection-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 3px;
      padding: 6px 16px 10px;
    }

    .tb-collection-color {
      height: 28px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .tb-collection-color:hover {
      transform: scale(1.12);
      border-color: var(--dark);
    }

    .tb-collection-color.on {
      border-color: var(--dark);
    }

    .tb-summary-strip {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
    }

    .tb-summary-strip div {
      flex: 1;
      height: 28px;
      border: 1px solid var(--line);
    }

    .h-scroll {
      overflow-x: auto;
      display: flex;
      gap: 3px;
      flex-wrap: nowrap;
    }

    .h-scroll button {
      white-space: nowrap;
    }

    .small-muted {
      font-size: 9px;
      color: #bbb;
    }

    .saved-empty {
      text-align: center;
      padding: 100px 0;
      color: #ccc;
    }

    @media (max-width: 1200px) {
      .collections-layout,
      .trendboard-layout {
        grid-template-columns: 210px 1fr;
      }

      .collections-layout .panel.right,
      .trendboard-layout .panel.right {
        grid-column: 1 / -1;
        border-left: none;
        border-top: 1px solid var(--line);
      }

      .trendboard-layout .canvas {
        min-height: 420px;
      }
    }

    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
        padding: 0 14px;
      }

      .season-badge-wrap {
        display: none;
      }

      .tabs {
        overflow-x: auto;
      }

      .collections-layout,
      .build-layout,
      .trendboard-layout {
        grid-template-columns: 1fr;
      }

      .panel.left,
      .panel.right {
        border: none;
        border-top: 1px solid var(--line);
      }

      .canvas {
        padding: 18px 14px;
      }

      .color-grid-lg,
      .color-grid-5 {
        grid-template-columns: repeat(2, 1fr);
      }

      .saved-grid {
        grid-template-columns: 1fr;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: #ddd;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }
  </style>
</head>
<body>
  <div class="app" id="app"></div>

  <script>
    function hexToRgb(hex) {
      return {
        r: parseInt(hex.slice(1, 3), 16),
        g: parseInt(hex.slice(3, 5), 16),
        b: parseInt(hex.slice(5, 7), 16),
      };
    }

    function hexToHsl(hex) {
      let rgb = hexToRgb(hex);
      let r = rgb.r / 255;
      let g = rgb.g / 255;
      let b = rgb.b / 255;
      let max = Math.max(r, g, b);
      let min = Math.min(r, g, b);
      let h = 0;
      let s = 0;
      let l = (max + min) / 2;
      if (max !== min) {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r:
            h = ((g - b) / d + (g < b ? 6 : 0)) / 6;
            break;
          case g:
            h = ((b - r) / d + 2) / 6;
            break;
          case b:
            h = ((r - g) / d + 4) / 6;
            break;
        }
      }
      return {
        h: Math.round(h * 360),
        s: Math.round(s * 100),
        l: Math.round(l * 100),
      };
    }

    function hslToHex(h, s, l) {
      h = ((h % 360) + 360) % 360;
      s = Math.max(0, Math.min(100, s));
      l = Math.max(0, Math.min(100, l));
      const a = s * Math.min(l, 100 - l) / 100;
      const f = function (n) {
        const k = (n + h / 30) % 12;
        return Math.round(255 * (l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1)))
          .toString(16)
          .padStart(2, "0");
      };
      return "#" + f(0) + f(8) + f(4);
    }

    function getLuminance(hex) {
      const rgb = hexToRgb(hex);
      return 0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b;
    }

    function rgbToCmyk(rgb) {
      let r = rgb.r / 255;
      let g = rgb.g / 255;
      let b = rgb.b / 255;
      const k = 1 - Math.max(r, g, b);
      if (k === 1) {
        return { c: 0, m: 0, y: 0, k: 100 };
      }
      return {
        c: Math.round(((1 - r - k) / (1 - k)) * 100),
        m: Math.round(((1 - g - k) / (1 - k)) * 100),
        y: Math.round(((1 - b - k) / (1 - k)) * 100),
        k: Math.round(k * 100),
      };
    }

    function generateHarmonies(hex) {
      const hsl = hexToHsl(hex);
      const h = hsl.h;
      const s = hsl.s;
      const l = hsl.l;
      return {
        Monochromatic: [
          hslToHex(h, s, Math.min(93, l + 32)),
          hslToHex(h, s, Math.min(93, l + 16)),
          hex,
          hslToHex(h, s, Math.max(7, l - 16)),
          hslToHex(h, s, Math.max(7, l - 32)),
        ],
        Analogous: [
          hslToHex(h - 30, s, l),
          hslToHex(h - 15, s, l),
          hex,
          hslToHex(h + 15, s, l),
          hslToHex(h + 30, s, l),
        ],
        Complementary: [
          hex,
          hslToHex(h + 30, Math.max(20, s - 10), Math.min(88, l + 18)),
          hslToHex(h + 180, s, l),
          hslToHex(h + 150, s, l),
          hslToHex(h + 210, s, l),
        ],
        Triadic: [
          hex,
          hslToHex(h + 120, s, l),
          hslToHex(h + 240, s, l),
          hslToHex(h + 60, Math.max(20, s - 20), Math.min(90, l + 15)),
          hslToHex(h + 300, Math.max(20, s - 20), Math.min(90, l + 15)),
        ],
      };
    }

    const COLLECTIONS = [
      { id: "SS26-COASTAL", name: "Coastal Drift", season: "SS26", category: "Fashion",
        colors: [

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function captureFocus() {
      const el = document.activeElement;
      if (!el || !el.matches("input, textarea, select")) return null;
      return {
        id: el.id || null,
        textId: el.dataset.textId || null,
        start: typeof el.selectionStart === "number" ? el.selectionStart : null,
        end: typeof el.selectionEnd === "number" ? el.selectionEnd : null,
      };
    }

    function restoreFocus(focus) {
      if (!focus) return;
      let el = null;
      if (focus.id) {
        el = document.getElementById(focus.id);
      } else if (focus.textId) {
        el = document.querySelector("textarea[data-text-id=\"" + focus.textId + "\"]");
      }
      if (!el) return;
      el.focus();
      if (focus.start !== null && typeof el.setSelectionRange === "function") {
        try {
          el.setSelectionRange(focus.start, focus.end);
        } catch (err) {
          // no-op for unsupported inputs
        }
      }
    }

    function copyHex(hex, key) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(hex).catch(function () {});
      }
      state.copiedKey = key;
      render();
      clearTimeout(copiedTimer);
      copiedTimer = setTimeout(function () {
        state.copiedKey = null;
        render();
      }, 1100);
    }

    function getFilteredCollections() {
      return COLLECTIONS.filter(function (c) {
        return (state.seasonFilter === "All" || c.season === state.seasonFilter) &&
          (state.categoryFilter === "All" || c.category === state.categoryFilter);
      });
    }

    function getCurrentCollection() {
      return COLLECTIONS[state.selectedCollection] || COLLECTIONS[0];
    }

    function getCurrentHarmony() {
      const harmonies = generateHarmonies(state.customColor);
      return harmonies[state.harmonyMode];
    }

    function selectedColor() {
      if (state.tab !== "collections" || state.selectedChip === null) return null;
      const coll = getCurrentCollection();
      return coll.colors[state.selectedChip] || null;
    }

    function renderColorChip(color, opts) {
      const size = opts.size || "md";
      const selected = !!opts.selected;
      const mini = !!opts.mini;
      const action = opts.action || "copy-hex";
      const payload = opts.payload || "";
      const key = opts.copyKey || (color.hex + "-" + action + "-" + payload);
      const copied = state.copiedKey === key;
      const lum = getLuminance(color.hex);

      if (mini) {
        return "<button class=\"chip-mini\" title=\"" + escapeHtml(color.name + " · " + color.hex) + "\" data-action=\"" + action + "\" data-payload=\"" + escapeHtml(payload) + "\" data-copy-key=\"" + escapeHtml(key) + "\" data-hex=\"" + escapeHtml(color.hex) + "\">" +
          "<div class=\"chip-color\" style=\"background:" + color.hex + "\">" +
            (copied ? "<div class=\"chip-copy\" style=\"background:rgba(0,0,0,0.18);color:#fff\">✓</div>" : "") +
          "</div>" +
          "<div class=\"chip-meta\">" +
            "<div class=\"chip-name\">" + escapeHtml(color.name || "") + "</div>" +
            "<div class=\"chip-code\">" + escapeHtml(color.hex.toUpperCase()) + "</div>" +
          "</div>" +
        "</button>";
      }

      return "<button class=\"color-chip chip-" + size + (selected ? " selected" : "") + "\" data-action=\"" + action + "\" data-payload=\"" + escapeHtml(payload) + "\" data-copy-key=\"" + escapeHtml(key) + "\" data-hex=\"" + escapeHtml(color.hex) + "\">" +
        "<div class=\"chip-color\" style=\"background:" + color.hex + "\">" +
          (copied ? "<div class=\"chip-copy\" style=\"background:" + (lum < 128 ? "rgba(255,255,255,0.25);color:#fff" : "rgba(0,0,0,0.2);color:#000") + "\">✓</div>" : "") +
        "</div>" +
        "<div class=\"chip-meta\">" +
          (color.name ? "<div class=\"chip-name\">" + escapeHtml(color.name) + "</div>" : "") +
          "<div class=\"chip-code\">" + escapeHtml((color.code || color.hex).toUpperCase()) + "</div>" +
        "</div>" +
      "</button>";
    }

    function renderDetailPanel(color) {

          "<div class=\"meta-row\"><span class=\"section-label\" style=\"margin:0;color:#aaa;font-size:10px\">HEX</span><span class=\"mono\">" + color.hex.toUpperCase() + "</span></div>" +

          "<div class=\"meta-row\"><span class=\"section-label\" style=\"margin:0;color:#aaa;font-size:10px\">HSL</span><span class=\"mono\">" + hsl.h + "°, " + hsl.s + "%, " + hsl.l + "%</span></div>" +

        const colors = coll.colors.map(function (c, i) {
          const on = tb.boardSwatches.some(function (s) { return s.hex === c.hex; });
          return "<div class=\"tb-collection-color" + (on ? " on" : "") + "\" style=\"background:" + c.hex + "\" title=\"Add " + escapeHtml(c.name) + "\" data-action=\"tb-add-collection-color\" data-coll=\"" + ci + "\" data-color=\"" + i + "\"></div>";
        }).join("");

        return "<div><div class=\"tb-palette-source\"><div style=\"font-size:10px;font-weight:700;color:#555;letter-spacing:.05em\">" + escapeHtml(coll.name) + "</div><div class=\"small-muted\">" + coll.season + " · " + coll.category + "</div></div><div class=\"tb-collection-grid\">" + colors + "</div></div>";
      }).join("");

      const styleButtons = function (block) {
        return BOARD_TEXT_STYLES.map(function (st) {
          return "<button class=\"text-style-btn" + (block.style === st ? " on" : "") + "\" data-action=\"tb-set-text-style\" data-id=\"" + block.id + "\" data-style=\"" + st + "\">" + st + "</button>";
        }).join("");
      };

      const textBlocks = tb.textBlocks.map(function (block) {
        const rows = block.style === "Display" ? 2 : block.style === "Headline" ? 2 : 3;
        const letter = block.style === "Display" ? "-.01em" : block.style === "Tag" ? ".12em" : "0";
        const transform = block.style === "Tag" ? "uppercase" : "none";
        return "<div class=\"text-block\">" +
          "<div class=\"text-toolbar\"><div class=\"section-label\" style=\"margin:0;font-size:9px\">Style</div><div class=\"h-scroll\">" + styleButtons(block) + "</div><button class=\"icon-btn soft\" data-action=\"tb-remove-text-block\" data-id=\"" + block.id + "\">✕</button></div>" +
          "<textarea rows=\"" + rows + "\" data-text-id=\"" + block.id + "\" style=\"border:none;padding:0;background:transparent;resize:none;font-size:" + TEXT_SIZES[block.style] + "px;font-weight:" + TEXT_WEIGHTS[block.style] + ";letter-spacing:" + letter + ";text-transform:" + transform + ";line-height:1.4\">" + escapeHtml(block.text) + "</textarea>" +
        "</div>";
      }).join("");

      const breakdown = tb.boardSwatches.length ?
        "<div><div class=\"section-label\">Colour Breakdown</div><div style=\"display:flex;flex-direction:column;gap:6px\">" + tb.boardSwatches.map(function (s) {
          return "<div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:24px;height:24px;background:" + s.hex + ";border:1px solid #efefed;flex-shrink:0\"></div><div><div style=\"font-size:10px;font-weight:600;line-height:1.2\">" + escapeHtml(s.name) + "</div><div class=\"mono small-muted\">" + s.hex.toUpperCase() + "</div></div></div>";
        }).join("") + "</div></div>"
        : "";

      const recentBoards = tb.boards.length ?
        "<div><div class=\"section-label\">Recent Boards</div><div style=\"display:flex;flex-direction:column;gap:6px\">" + tb.boards.map(function (b) {
          return "<div style=\"border:1px solid #efefed;overflow:hidden\"><div style=\"display:flex;height:18px\">" + b.swatches.map(function (s) { return "<div style=\"flex:1;background:" + s.hex + "\"></div>"; }).join("") + "</div><div style=\"padding:5px 7px\"><div style=\"font-size:10px;font-weight:600\">" + escapeHtml(b.title) + "</div><div class=\"small-muted\">" + b.season + " · " + b.swatches.length + " colours</div></div></div>";
        }).join("") + "</div></div>"
        : "";

      return "<div class=\"view trendboard-layout\">" +
        "<aside class=\"panel left\" style=\"display:flex;flex-direction:column\">" +
          "<div style=\"padding:16px 18px 12px;border-bottom:1px solid #efefed\">" +
            "<div class=\"section-label\" style=\"margin-bottom:10px\">Add Swatches</div>" +
            "<div style=\"margin-bottom:14px\">" +
              "<div class=\"sub-label\" style=\"margin-bottom:7px\">Custom Colour</div>" +
              "<div style=\"display:flex;gap:8px;align-items:center;margin-bottom:7px\"><input id=\"tb-picker-hex\" type=\"color\" value=\"" + tb.pickerHex + "\" style=\"width:36px;height:36px\"><div><div class=\"mono\" style=\"font-size:11px;font-weight:600\">" + tb.pickerHex.toUpperCase() + "</div><div class=\"mono small-muted\">H" + hexToHsl(tb.pickerHex).h + " S" + hexToHsl(tb.pickerHex).s + " L" + hexToHsl(tb.pickerHex).l + "</div></div></div>" +
              "<input id=\"tb-picker-name\" type=\"text\" placeholder=\"Colour name (optional)\" value=\"" + escapeHtml(tb.pickerName) + "\">" +
              "<button style=\"width:100%;margin-top:7px;padding:7px 0;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.12em;opacity:" + (tb.boardSwatches.length >= 12 ? "0.4" : "1") + "\" data-action=\"tb-add-picker\">+ ADD TO BOARD</button>" +
            "</div>" +
          "</div>" +
          "<div style=\"flex:1;overflow:auto\"><div style=\"padding:12px 18px 8px\"><div class=\"sub-label\">From Collections</div></div>" + collectionSources + "</div>" +
        "</aside>" +

        "<section style=\"background:#f7f7f5;overflow:auto\">" +
          "<div class=\"tb-header\">" +
            "<input id=\"tb-title\" type=\"text\" value=\"" + escapeHtml(tb.boardTitle) + "\">" +
            "<div style=\"display:flex;gap:6px;align-items:center;flex-wrap:wrap\">" +
              "<select id=\"tb-season\" style=\"font-size:10px;font-weight:600;letter-spacing:.1em;padding:4px 8px;color:#555\">" + BOARD_SEASONS.map(function (s) { return "<option" + (tb.season === s ? " selected" : "") + ">" + s + "</option>"; }).join("") + "</select>" +
              "<select id=\"tb-category\" style=\"font-size:10px;font-weight:600;letter-spacing:.1em;padding:4px 8px;color:#555\">" + BOARD_CATEGORIES.map(function (c) { return "<option" + (tb.category === c ? " selected" : "") + ">" + c + "</option>"; }).join("") + "</select>" +
              "<div style=\"display:flex;gap:2px;flex-wrap:wrap\">" + BOARD_LAYOUTS.map(function (l) { return "<button class=\"layout-btn" + (tb.layout === l ? " on" : "") + "\" data-action=\"tb-set-layout\" data-layout=\"" + l + "\">" + l + "</button>"; }).join("") + "</div>" +
            "</div>" +
          "</div>" +

          "<div style=\"padding:24px\">" +
            renderTrendSwatchArea(tb) +
            "<div class=\"meta-card\" style=\"margin-bottom:16px\"><div class=\"section-label\" style=\"margin-bottom:10px\">Keywords</div><div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px\">" + tb.keywords.map(function (kw, i) { return "<span class=\"pill\">" + escapeHtml(kw) + " <button data-action=\"tb-remove-keyword\" data-index=\"" + i + "\">✕</button></span>"; }).join("") + "</div><div style=\"display:flex;gap:6px\"><input id=\"tb-kw-input\" type=\"text\" placeholder=\"Add keyword…\" value=\"" + escapeHtml(tb.kwInput) + "\"><button style=\"padding:5px 12px;background:#1a1a1a;color:#fff;border:none;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.1em\" data-action=\"tb-add-keyword\">ADD</button></div></div>" +
            "<div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px\">" + textBlocks + "</div>" +
            "<button style=\"width:100%;padding:10px 0;border:1.5px dashed #d8d8d8;background:transparent;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.15em;color:#bbb\" data-action=\"tb-add-text-block\">+ ADD TEXT BLOCK</button>" +
          "</div>" +
        "</section>" +

        "<aside class=\"panel right\">" +
          "<div><div class=\"section-label\" style=\"margin-bottom:10px\">Board Summary</div><div style=\"font-size:13px;font-weight:700;margin-bottom:4px\">" + escapeHtml(tb.boardTitle || "Untitled") + "</div><div class=\"mono small-muted\" style=\"letter-spacing:.06em;margin-bottom:10px\">" + tb.season + " · " + tb.category + "</div>" +
          (tb.boardSwatches.length ? "<div class=\"tb-summary-strip\">" + tb.boardSwatches.map(function (s) { return "<div style=\"background:" + s.hex + "\"></div>"; }).join("") + "</div>" : "") +
          "<div style=\"font-size:11px;color:#888\">" + tb.boardSwatches.length + " swatch" + (tb.boardSwatches.length !== 1 ? "es" : "") + " · " + tb.textBlocks.length + " text block" + (tb.textBlocks.length !== 1 ? "s" : "") + "</div></div>" +
          "<div style=\"height:1px;background:#efefed\"></div>" +
          breakdown +
          (tb.boardSwatches.length ? "<div style=\"height:1px;background:#efefed\"></div>" : "") +
          recentBoards +
          "<div style=\"margin-top:auto\"><button style=\"width:100%;padding:12px 0;background:" + (tb.savedMsg ? "#2a6a3a" : "#1a1a1a") + ";color:#fff;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.15em\" data-action=\"tb-save-board\">" + (tb.savedMsg ? "✓ BOARD SAVED" : "SAVE BOARD") + "</button></div>" +
        "</aside>" +
      "</div>";
    }

    function renderSavedView() {
      if (state.saved.length === 0) {
        return "<div class=\"view\" style=\"padding:28px 32px\"><div class=\"saved-empty\"><div class=\"section-label\" style=\"font-size:11px;letter-spacing:.2em;color:#ccc\">No saved palettes yet</div><div style=\"font-size:13px;color:#ddd;margin-top:8px\">Browse collections or build a custom palette to save here.</div></div></div>";
      }

      const cards = state.saved.map(function (p) {
        const cols = p.colors.length;
        const strips = p.colors.map(function (c, ci) {
          return "<div style=\"display:flex;flex-direction:column\"><div style=\"flex:1;background:" + c.hex + "\"></div><div style=\"height:22px;background:#fff;display:flex;align-items:center;justify-content:center;border-right:" + (ci < cols - 1 ? "1px solid #f5f5f5" : "none") + "\"><div class=\"mono\" style=\"font-size:7px;color:#ccc;letter-spacing:.04em\">" + c.hex.toUpperCase().slice(1) + "</div></div></div>";
        }).join("");

        return "<div class=\"saved-card\">" +
          "<div class=\"saved-strip\" style=\"grid-template-columns:repeat(" + cols + ",1fr)\">" + strips + "</div>" +
          "<div class=\"saved-footer\"><div style=\"display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px\"><div style=\"font-size:14px;font-weight:700\">" + escapeHtml(p.name) + "</div><div class=\"mono\" style=\"font-size:9px;color:#bbb;letter-spacing:.08em\">" + escapeHtml(p.id) + "</div></div>" +
          (p.trend ? "<div style=\"display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;color:#fff;background:#1a1a1a;padding:2px 8px;margin-bottom:6px;text-transform:uppercase\">" + escapeHtml(p.trend) + "</div>" : "") +
          (p.note ? "<div style=\"font-size:12px;color:#888;line-height:1.55\">" + escapeHtml(p.note) + "</div>" : "") +
          "</div>" +
        "</div>";
      }).join("");

      return "<div class=\"view\" style=\"padding:28px 32px\">" +
        "<div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #efefed\"><h2 style=\"font-size:20px;font-weight:700;letter-spacing:.04em\">Saved Palettes</h2><div class=\"muted\" style=\"font-size:11px;font-weight:600;letter-spacing:.1em\">" + state.saved.length + " " + (state.saved.length === 1 ? "palette" : "palettes") + "</div></div>" +
        "<div class=\"saved-grid\">" + cards + "</div>" +
      "</div>";
    }

    function renderHeader() {
      const tabs = [
        { id: "collections", label: "Collections" },
        { id: "build", label: "Build" },
        { id: "trendboard", label: "Trend Board" },
        { id: "saved", label: "Saved (" + state.saved.length + ")" },
      ];

      return "<header class=\"topbar\">" +
        "<div class=\"brand-wrap\"><div class=\"brand\"><div class=\"brand-bars\"><span style=\"background:#E87820\"></span><span style=\"background:#3D6E8A\"></span><span style=\"background:#7A9070\"></span><span style=\"background:#C84820\"></span><span style=\"background:#3A4070\"></span></div><div><div class=\"brand-title\">CHROMA</div><div class=\"brand-sub\">COLOUR INTELLIGENCE</div></div></div></div>" +
        "<nav class=\"tabs\">" + tabs.map(function (t) { return "<button class=\"tab" + (state.tab === t.id ? " on" : "") + "\" data-action=\"switch-tab\" data-tab=\"" + t.id + "\">" + t.label + "</button>"; }).join("") + "</nav>" +
        "<div class=\"season-badge-wrap\"><div class=\"season-badge\">SS · AW 2026</div></div>" +
      "</header>";
    }

    function renderView() {
      if (state.tab === "collections") return renderCollectionsView();
      if (state.tab === "build") return renderBuildView();
      if (state.tab === "trendboard") return renderTrendBoardView();
      return renderSavedView();
    }

    function render(opts) {
      const preserve = opts && opts.preserveFocus;
      const focus = preserve ? captureFocus() : null;
      document.getElementById("app").innerHTML = renderHeader() + renderView();
      if (focus) restoreFocus(focus);
    }

    function savePalette() {
      const coll = getCurrentCollection();
      const harmony = getCurrentHarmony();
      const payload = state.tab === "collections"
        ? {
            name: coll.name,
            id: coll.id,
            colors: coll.colors,
            trend: state.activeTrend !== null ? TREND_TAGS[state.activeTrend] : null,
            note: state.note,
          }
        : {
            name: "Custom · " + state.harmonyMode,
            id: "CUSTOM-" + Date.now(),
            colors: harmony.map(function (hex, i) {
              return { hex: hex, name: hex, code: "CHR-C" + (i + 1) + "00" };
            }),
            trend: state.activeTrend !== null ? TREND_TAGS[state.activeTrend] : null,
            note: state.note,
          };

      state.saved = [payload].concat(state.saved.slice(0, 11));
      state.justSaved = true;
      clearTimeout(saveTimer);
      saveTimer = setTimeout(function () {
        state.justSaved = false;
        render();
      }, 1800);
      render();
    }

    function handleAction(actionEl) {
      const action = actionEl.dataset.action;
      if (!action) return;

      if (action === "switch-tab") {
        state.tab = actionEl.dataset.tab;
        render();
        return;
      }

      if (action === "set-season-filter") {
        state.seasonFilter = actionEl.dataset.value;
        state.selectedChip = null;
        render();
        return;
      }

      if (action === "set-category-filter") {
        state.categoryFilter = actionEl.dataset.value;
        state.selectedChip = null;
        render();
        return;
      }

      if (action === "select-collection") {
        state.selectedCollection = Number(actionEl.dataset.index);
        state.selectedChip = null;
        render();
        return;
      }

      if (action === "select-chip") {
        const idx = Number(actionEl.dataset.payload);
        state.selectedChip = state.selectedChip === idx ? null : idx;
        copyHex(actionEl.dataset.hex, actionEl.dataset.copyKey);
        return;
      }

      if (action === "copy-hex") {
        copyHex(actionEl.dataset.hex, actionEl.dataset.copyKey || actionEl.dataset.payload || actionEl.dataset.hex);
        return;
      }

      if (action === "toggle-trend") {
        const i = Number(actionEl.dataset.index);
        state.activeTrend = state.activeTrend === i ? null : i;
        render();
        return;
      }

      if (action === "set-harmony-mode") {
        state.harmonyMode = actionEl.dataset.mode;
        render();
        return;
      }

      if (action === "save-palette") {
        savePalette();
        return;
      }

      if (action === "tb-add-picker") {
        const tb = state.trendboard;
        if (tb.boardSwatches.length >= 12) return;
        tb.boardSwatches.push({
          hex: tb.pickerHex,
          name: tb.pickerName || tb.pickerHex.toUpperCase(),
          code: "CHR-B" + String(tb.nextId++).padStart(3, "0"),
        });
        render();
        return;
      }

      if (action === "tb-add-collection-color") {
        const tb = state.trendboard;
        if (tb.boardSwatches.length >= 12) return;
        const coll = COLLECTIONS[Number(actionEl.dataset.coll)];
        const color = coll.colors[Number(actionEl.dataset.color)];
        if (tb.boardSwatches.some(function (s) { return s.hex === color.hex; })) return;
        tb.boardSwatches.push({ hex: color.hex, name: color.name, code: color.code });
        render();
        return;
      }

      if (action === "tb-remove-swatch") {
        const tb = state.trendboard;
        const idx = Number(actionEl.dataset.index);
        tb.boardSwatches = tb.boardSwatches.filter(function (_, i) { return i !== idx; });
        render();
        return;
      }

      if (action === "tb-set-layout") {
        state.trendboard.layout = actionEl.dataset.layout;
        render();
        return;
      }

      if (action === "tb-remove-keyword") {
        const idx = Number(actionEl.dataset.index);
        state.trendboard.keywords = state.trendboard.keywords.filter(function (_, i) { return i !== idx; });
        render();
        return;
      }

      if (action === "tb-add-keyword") {
        const tb = state.trendboard;
        const kw = tb.kwInput.trim();
        if (kw && !tb.keywords.includes(kw)) {
          tb.keywords.push(kw);
          tb.kwInput = "";
          render();
        }
        return;
      }

      if (action === "tb-add-text-block") {
        const tb = state.trendboard;
        tb.textBlocks.push({ id: tb.nextId++, style: "Body", text: "New text block..." });
        render();
        return;
      }

      if (action === "tb-remove-text-block") {
        const id = Number(actionEl.dataset.id);
        state.trendboard.textBlocks = state.trendboard.textBlocks.filter(function (b) { return b.id !== id; });
        render();
        return;
      }

      if (action === "tb-set-text-style") {
        const id = Number(actionEl.dataset.id);
        const style = actionEl.dataset.style;
        state.trendboard.textBlocks = state.trendboard.textBlocks.map(function (b) {
          return b.id === id ? { id: b.id, style: style, text: b.text } : b;
        });
        render();
        return;
      }

      if (action === "tb-save-board") {
        const tb = state.trendboard;
        tb.boards = [{
          title: tb.boardTitle,
          season: tb.season,
          category: tb.category,
          swatches: tb.boardSwatches.slice(),
          texts: tb.textBlocks.slice(),
          keywords: tb.keywords.slice(),
          layout: tb.layout,
          ts: Date.now(),
        }].concat(tb.boards.slice(0, 5));
        tb.savedMsg = true;
        clearTimeout(boardSavedTimer);
        boardSavedTimer = setTimeout(function () {
          tb.savedMsg = false;
          render();
        }, 1800);
        render();
      }
    }

    function handleInput(target) {
      if (target.id === "global-note") {
        state.note = target.value;
        return;
      }

      if (target.id === "custom-color") {
        state.customColor = target.value;
        render({ preserveFocus: true });
        return;
      }

      if (target.id === "tb-title") {
        state.trendboard.boardTitle = target.value;
        render({ preserveFocus: true });
        return;
      }

      if (target.id === "tb-season") {
        state.trendboard.season = target.value;
        render();
        return;
      }

      if (target.id === "tb-category") {
        state.trendboard.category = target.value;
        render();
        return;
      }

      if (target.id === "tb-picker-hex") {
        state.trendboard.pickerHex = target.value;
        render({ preserveFocus: true });
        return;
      }

      if (target.id === "tb-picker-name") {
        state.trendboard.pickerName = target.value;
        return;
      }

      if (target.id === "tb-kw-input") {
        state.trendboard.kwInput = target.value;
        return;
      }

      if (target.dataset.textId) {
        const id = Number(target.dataset.textId);
        state.trendboard.textBlocks = state.trendboard.textBlocks.map(function (b) {
          return b.id === id ? { id: b.id, style: b.style, text: target.value } : b;
        });
      }
    }

    document.addEventListener("click", function (e) {
      const actionEl = e.target.closest("[data-action]");
      if (!actionEl) return;
      handleAction(actionEl);
    });

    document.addEventListener("input", function (e) {
      handleInput(e.target);
    });

    document.addEventListener("change", function (e) {
      handleInput(e.target);
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && e.target && e.target.id === "tb-kw-input") {
        e.preventDefault();
        const tb = state.trendboard;
        const kw = tb.kwInput.trim();
        if (kw && !tb.keywords.includes(kw)) {
          tb.keywords.push(kw);
          tb.kwInput = "";
          render();
        }
      }
    });

    render();
  </script>
</body>
</html>
